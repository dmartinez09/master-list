name: Build and deploy Node.js app to Azure Web App - master-list-ta

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      # ─── Frontend ───────────────────────────────────────────
      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      # ─── Backend ────────────────────────────────────────────
      - name: Install backend deps
        run: npm ci
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      # ─── Empaquetar todo en ./deploy ────────────────────────
      - name: Build deploy package
        run: |
          set -e
          rm -rf deploy
          mkdir -p deploy
          # Backend compilado
          cp -r backend/dist deploy/dist
          # Frontend bundle dentro de public/
          cp -r dist deploy/public
          # package.json minimal para arrancar
          cp backend/package.json deploy/package.json
          cp backend/package-lock.json deploy/package-lock.json
          # Reescribir scripts para que start apunte a ./dist/server.js
          # (mantiene engines y dependencies del backend)
          echo "=== Contenido de deploy/ ==="
          ls -la deploy/
          echo ""
          echo "=== deploy/dist/ ==="
          ls deploy/dist/ | head -10
          echo ""
          echo "=== deploy/public/ ==="
          ls deploy/public/ | head -10

      # ─── Solo deps de producción ────────────────────────────
      - name: Install production deps in deploy
        run: npm ci --omit=dev
        working-directory: deploy

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./

      - name: List downloaded files
        run: |
          echo "=== Estructura recibida ==="
          ls -la
          echo ""
          echo "=== dist/ ==="
          ls dist/ | head -5
          echo ""
          echo "=== public/ ==="
          ls public/ | head -5

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'master-list-ta'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
