name: Build and deploy Node.js app to Azure Web App - master-list-ta

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      # 1. Frontend
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:frontend

      # 2. Backend
      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      # 3. Combinar frontend + backend en backend/public + backend/dist
      - name: Prepare deploy package
        run: node scripts/prepare-deploy.js

      # 4. Reducir node_modules del backend a solo producción (sin devDeps)
      - name: Prune backend dev dependencies
        run: npm prune --production
        working-directory: backend

      # 5. Subir solo lo necesario para correr en Azure
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: |
            backend/dist
            backend/public
            backend/node_modules
            backend/package.json
            backend/package-lock.json

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: deploy

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'master-list-ta'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: deploy/backend
